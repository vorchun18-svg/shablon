<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ДокПро — Новый документ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    /* ===== WIZARD ===== */
    .wizard { max-width: 860px; margin: 0 auto; }

    .wizard-steps {
      display: flex; align-items: center; margin-bottom: var(--space-8);
      counter-reset: step;
    }
    .wizard-step {
      display: flex; align-items: center; gap: var(--space-2);
      font-size: var(--text-sm); color: var(--color-text-muted);
      flex: 1; position: relative;
    }
    .wizard-step:not(:last-child)::after {
      content: ''; flex: 1; height: 1px;
      background: var(--color-divider); margin: 0 var(--space-3);
    }
    .wizard-step-num {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid var(--color-border);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-xs); font-weight: 700;
      background: var(--color-surface); flex-shrink: 0;
      transition: all var(--transition);
    }
    .wizard-step.active .wizard-step-num {
      border-color: var(--color-primary); background: var(--color-primary);
      color: #fff;
    }
    .wizard-step.done .wizard-step-num {
      border-color: var(--color-success); background: var(--color-success);
      color: #fff;
    }
    .wizard-step.active .wizard-step-label { color: var(--color-text); font-weight: 600; }
    .wizard-step.done .wizard-step-label   { color: var(--color-success); }

    .wizard-panel { display: none; animation: fadeIn .25s ease; }
    .wizard-panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .wizard-nav {
      display: flex; justify-content: space-between;
      margin-top: var(--space-8); padding-top: var(--space-6);
      border-top: 1px solid var(--color-divider);
    }

    /* ===== КАРТОЧКИ ВЫБОРА ===== */
    .select-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: var(--space-3); }
    .select-card {
      padding: var(--space-4); border: 2px solid var(--color-border);
      border-radius: var(--radius-lg); cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
      background: var(--color-surface);
    }
    .select-card:hover { border-color: var(--color-primary); background: var(--color-primary-light); }
    .select-card.selected { border-color: var(--color-primary); background: var(--color-primary-light); }
    .select-card-type { font-size: var(--text-xs); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--color-text-muted); margin-bottom: var(--space-1); }
    .select-card-name { font-weight: 600; font-size: var(--text-sm); color: var(--color-text); }
    .select-card-desc { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: var(--space-1); }
    .select-card.selected .select-card-name { color: var(--color-primary); }

    /* ===== ТАБЛИЦА УСЛУГ ===== */
    .services-table { width: 100%; border-collapse: collapse; }
    .services-table th { font-size: var(--text-xs); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--color-text-muted); padding: var(--space-2) var(--space-3); text-align: left; border-bottom: 1px solid var(--color-divider); }
    .services-table td { padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--color-divider); vertical-align: middle; }
    .services-table tr:last-child td { border-bottom: none; }
    .services-table input, .services-table select { width: 100%; }
    .services-total { display: flex; justify-content: flex-end; gap: var(--space-8); padding: var(--space-4) var(--space-3); background: var(--color-surface-offset); border-radius: 0 0 var(--radius-md) var(--radius-md); }
    .services-total-item { text-align: right; }
    .services-total-label { font-size: var(--text-xs); color: var(--color-text-muted); }
    .services-total-value { font-size: var(--text-lg); font-weight: 700; color: var(--color-text); font-variant-numeric: tabular-nums; }

    /* ===== ПРЕДПРОСМОТР ===== */
    .preview-section { margin-bottom: var(--space-6); }
    .preview-section-title { font-size: var(--text-xs); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--color-text-muted); margin-bottom: var(--space-3); }
    .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2) var(--space-6); }
    .preview-row { display: flex; flex-direction: column; gap: 2px; }
    .preview-key { font-size: var(--text-xs); color: var(--color-text-muted); }
    .preview-val { font-size: var(--text-sm); font-weight: 500; color: var(--color-text); }
  </style>
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="flex items-center gap-3">
        <button class="hamburger" id="hamburger" aria-label="Меню">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">Новый документ</span>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" id="theme-toggle" onclick="Layout.toggleTheme()"></button>
      </div>
    </header>

    <main class="page-content">
      <div class="wizard">

        <!-- Шаги прогресса -->
        <div class="wizard-steps" id="wizard-steps">
          <div class="wizard-step active" data-step="1">
            <div class="wizard-step-num">1</div>
            <span class="wizard-step-label">Шаблон</span>
          </div>
          <div class="wizard-step" data-step="2">
            <div class="wizard-step-num">2</div>
            <span class="wizard-step-label">Реквизиты</span>
          </div>
          <div class="wizard-step" data-step="3">
            <div class="wizard-step-num">3</div>
            <span class="wizard-step-label">Услуги</span>
          </div>
          <div class="wizard-step" data-step="4">
            <div class="wizard-step-num">4</div>
            <span class="wizard-step-label">Проверка</span>
          </div>
        </div>

        <!-- ШАГ 1: Выбор шаблона -->
        <div class="wizard-panel active card" id="panel-1">
          <div class="card-header">
            <span class="card-title">Выберите шаблон документа</span>
          </div>
          <div class="card-body">
            <div id="template-filter" class="flex gap-2 mb-4" style="flex-wrap:wrap">
              <button class="btn btn-secondary btn-sm active-filter" onclick="filterTemplates('')" data-filter="">Все</button>
              <button class="btn btn-secondary btn-sm" onclick="filterTemplates('Договор')" data-filter="Договор">Договор</button>
              <button class="btn btn-secondary btn-sm" onclick="filterTemplates('Спецификация')" data-filter="Спецификация">Спецификация</button>
              <button class="btn btn-secondary btn-sm" onclick="filterTemplates('Акт')" data-filter="Акт">Акт</button>
              <button class="btn btn-secondary btn-sm" onclick="filterTemplates('Счёт')" data-filter="Счёт">Счёт</button>
            </div>
            <div id="templates-grid" class="select-grid">
              <div class="text-muted text-sm">Загрузка шаблонов...</div>
            </div>
          </div>
          <div class="wizard-nav">
            <span></span>
            <button class="btn btn-primary" onclick="goStep(2)" id="btn-next-1">Далее →</button>
          </div>
        </div>

        <!-- ШАГ 2: Реквизиты -->
        <div class="wizard-panel card" id="panel-2">
          <div class="card-header">
            <span class="card-title">Реквизиты документа</span>
          </div>
          <div class="card-body">
            <div class="form-row">
              <div class="form-group" style="flex:2">
                <label class="form-label required">Название документа</label>
                <input type="text" id="doc-title" class="form-input" placeholder="Договор № 1 от 01.01.2026">
              </div>
              <div class="form-group">
                <label class="form-label">Номер документа</label>
                <input type="text" id="doc-number" class="form-input" placeholder="001">
              </div>
              <div class="form-group">
                <label class="form-label">Дата документа</label>
                <input type="date" id="doc-date" class="form-input">
              </div>
            </div>

            <div class="form-row mt-2">
              <div class="form-group">
                <label class="form-label required">Наша компания</label>
                <select id="company-select" class="form-select" onchange="onCompanyChange()">
                  <option value="">— Выберите компанию —</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label required">Контрагент</label>
                <select id="contractor-select" class="form-select">
                  <option value="">— Выберите контрагента —</option>
                </select>
              </div>
            </div>

            <!-- Превью реквизитов компании -->
            <div id="company-preview" style="display:none" class="mt-4">
              <div style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-muted);margin-bottom:var(--space-3)">Реквизиты компании</div>
              <div class="preview-grid" id="company-preview-grid"></div>
            </div>
          </div>
          <div class="wizard-nav">
            <button class="btn btn-secondary" onclick="goStep(1)">← Назад</button>
            <button class="btn btn-primary" onclick="goStep(3)">Далее →</button>
          </div>
        </div>

        <!-- ШАГ 3: Услуги -->
        <div class="wizard-panel card" id="panel-3">
          <div class="card-header">
            <span class="card-title">Перечень услуг</span>
            <div class="flex gap-2">
              <select id="service-quick-add" class="form-select" style="max-width:280px" onchange="quickAddService(this)">
                <option value="">Добавить из справочника...</option>
              </select>
              <button class="btn btn-secondary" onclick="addServiceRow()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Строка
              </button>
            </div>
          </div>
          <div class="card-body" style="padding:0">
            <div style="overflow-x:auto">
              <table class="services-table">
                <thead>
                  <tr>
                    <th style="width:40%">Наименование</th>
                    <th style="width:10%">Кол-во</th>
                    <th style="width:10%">Ед.</th>
                    <th style="width:15%">Цена, ₽</th>
                    <th style="width:15%">Сумма, ₽</th>
                    <th style="width:10%"></th>
                  </tr>
                </thead>
                <tbody id="services-tbody"></tbody>
              </table>
            </div>
            <div class="services-total">
              <div class="services-total-item">
                <div class="services-total-label">Итого без НДС</div>
                <div class="services-total-value" id="total-sum">0,00</div>
              </div>
            </div>
          </div>
          <div class="wizard-nav">
            <button class="btn btn-secondary" onclick="goStep(2)">← Назад</button>
            <button class="btn btn-primary" onclick="goStep(4)">Далее →</button>
          </div>
        </div>

        <!-- ШАГ 4: Предпросмотр и генерация -->
        <div class="wizard-panel card" id="panel-4">
          <div class="card-header">
            <span class="card-title">Проверка и генерация</span>
          </div>
          <div class="card-body" id="preview-body">
            <!-- заполняется динамически -->
          </div>
          <div class="wizard-nav">
            <button class="btn btn-secondary" onclick="goStep(3)">← Назад</button>
            <button class="btn btn-primary btn-lg" id="generate-btn" onclick="generateDoc()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Сгенерировать и скачать
            </button>
          </div>
        </div>

      </div><!-- /wizard -->
    </main>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/layout.js"></script>
<script>
Layout.init('new-doc');

// ===== СОСТОЯНИЕ =====
const state = {
  step: 1,
  template: null,
  company: null,
  contractor: null,
  services: []
};

let allTemplates = [], allCompanies = [], allContractors = [], allServices = [];

// ===== ИНИЦИАЛИЗАЦИЯ =====
async function init() {
  document.getElementById('doc-date').value = UI.today();
  try {
    [allTemplates, allCompanies, allContractors, allServices] = await Promise.all([
      Api.get('/templates'),
      Api.get('/companies'),
      Api.get('/contractors'),
      Api.get('/services')
    ]);
    renderTemplates(allTemplates);
    populateSelect('company-select', allCompanies, 'id', 'name', '— Выберите компанию —');
    populateSelect('contractor-select', allContractors, 'id', 'name', '— Выберите контрагента —');
    populateServiceQuickAdd();
  } catch(e) { UI.toast('Ошибка загрузки: ' + e.message, 'error'); }
}

function populateSelect(id, arr, valKey, labelKey, placeholder) {
  const sel = document.getElementById(id);
  sel.innerHTML = `<option value="">${placeholder}</option>` +
    arr.map(x => `<option value="${x[valKey]}">${x[labelKey]}</option>`).join('');
}

function populateServiceQuickAdd() {
  const sel = document.getElementById('service-quick-add');
  sel.innerHTML = '<option value="">Добавить из справочника...</option>' +
    allServices.map(s => `<option value="${s.id}">${s.name} (${UI.money(s.price)} ₽/${s.unit})</option>`).join('');
}

// ===== ШАГ 1: Шаблоны =====
let tplFilter = '';

function filterTemplates(type) {
  tplFilter = type;
  document.querySelectorAll('#template-filter button').forEach(b => {
    b.classList.toggle('active-filter', b.dataset.filter === type);
  });
  const filtered = type ? allTemplates.filter(t => t.doc_type === type) : allTemplates;
  renderTemplates(filtered);
}

function renderTemplates(list) {
  const grid = document.getElementById('templates-grid');
  if (!list.length) {
    grid.innerHTML = `<div class="text-muted text-sm" style="grid-column:1/-1">
      ${allTemplates.length ? 'Нет шаблонов этого типа' : 'Шаблоны не загружены — перейдите в раздел «Шаблоны»'}
    </div>`;
    return;
  }
  grid.innerHTML = list.map(t => `
    <div class="select-card ${state.template?.id===t.id?'selected':''}" onclick="selectTemplate(${t.id})">
      <div class="select-card-type">${t.doc_type}</div>
      <div class="select-card-name">${t.name}</div>
      ${t.description ? `<div class="select-card-desc">${t.description}</div>` : ''}
    </div>`).join('');
}

function selectTemplate(id) {
  state.template = allTemplates.find(t => t.id === id);
  document.querySelectorAll('.select-card').forEach(c => c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  if (!document.getElementById('doc-title').value && state.template) {
    document.getElementById('doc-title').value = state.template.name;
  }
}

// ===== ШАГ 2: Реквизиты =====
function onCompanyChange() {
  const id = parseInt(document.getElementById('company-select').value);
  state.company = allCompanies.find(c => c.id === id) || null;
  const prev = document.getElementById('company-preview');
  if (!state.company) { prev.style.display = 'none'; return; }
  prev.style.display = 'block';
  document.getElementById('company-preview-grid').innerHTML = [
    ['ИНН', state.company.inn], ['КПП', state.company.kpp],
    ['ОГРН', state.company.ogrn], ['Банк', state.company.bank],
    ['БИК', state.company.bik], ['Р/с', state.company.account],
    ['Подписант', state.company.signatory], ['Должность', state.company.position],
  ].map(([k,v]) => v ? `<div class="preview-row"><div class="preview-key">${k}</div><div class="preview-val">${v}</div></div>` : '').join('');
}

// ===== ШАГ 3: Услуги =====
let serviceRows = [];

function quickAddService(sel) {
  const id = parseInt(sel.value);
  if (!id) return;
  const svc = allServices.find(s => s.id === id);
  if (svc) addServiceRow(svc);
  sel.value = '';
}

function addServiceRow(svc) {
  const rowId = Date.now();
  serviceRows.push({ id: rowId, name: svc?.name||'', qty: 1, unit: svc?.unit||'шт.', price: svc?.price||0 });
  renderServiceRows();
}

function removeRow(rowId) {
  serviceRows = serviceRows.filter(r => r.id !== rowId);
  renderServiceRows();
}

function updateRow(rowId, field, value) {
  const row = serviceRows.find(r => r.id === rowId);
  if (!row) return;
  row[field] = field === 'qty' || field === 'price' ? parseFloat(value)||0 : value;
  if (field === 'qty' || field === 'price') updateTotal();
}

function renderServiceRows() {
  const tbody = document.getElementById('services-tbody');
  if (!serviceRows.length) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:var(--space-8);color:var(--color-text-muted);font-size:var(--text-sm)">
      Нет строк — добавьте услугу из справочника или нажмите «Строка»
    </td></tr>`;
    updateTotal();
    return;
  }
  tbody.innerHTML = serviceRows.map(row => `
    <tr data-row="${row.id}">
      <td><input type="text" class="form-input form-input-sm" value="${row.name}" placeholder="Наименование" oninput="updateRow(${row.id},'name',this.value)"></td>
      <td><input type="number" class="form-input form-input-sm" value="${row.qty}" min="0.01" step="0.01" style="text-align:right" onchange="updateRow(${row.id},'qty',this.value);updateRowSum(${row.id})"></td>
      <td>
        <select class="form-select form-input-sm" onchange="updateRow(${row.id},'unit',this.value)">
          ${['шт.','услуга','час','день','м²','км','га','компл.','работа'].map(u=>`<option ${u===row.unit?'selected':''}>${u}</option>`).join('')}
        </select>
      </td>
      <td><input type="number" class="form-input form-input-sm" value="${row.price}" min="0" step="0.01" style="text-align:right" onchange="updateRow(${row.id},'price',this.value);updateRowSum(${row.id})"></td>
      <td style="text-align:right;font-variant-numeric:tabular-nums;font-size:var(--text-sm)" id="row-sum-${row.id}">${UI.money(row.qty*row.price)}</td>
      <td style="text-align:center">
        <button class="btn btn-ghost btn-icon" onclick="removeRow(${row.id})" title="Удалить строку" style="color:var(--color-error)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </td>
    </tr>`).join('');
  updateTotal();
}

function updateRowSum(rowId) {
  const row = serviceRows.find(r => r.id === rowId);
  if (row) document.getElementById('row-sum-'+rowId).textContent = UI.money(row.qty * row.price);
  updateTotal();
}

function updateTotal() {
  const total = serviceRows.reduce((s, r) => s + r.qty * r.price, 0);
  document.getElementById('total-sum').textContent = UI.money(total);
}

// ===== ШАГ 4: Предпросмотр =====
function renderPreview() {
  const company    = allCompanies.find(c => c.id === parseInt(document.getElementById('company-select').value));
  const contractor = allContractors.find(c => c.id === parseInt(document.getElementById('contractor-select').value));
  const total      = serviceRows.reduce((s, r) => s + r.qty * r.price, 0);

  document.getElementById('preview-body').innerHTML = `
    <div class="preview-section">
      <div class="preview-section-title">Документ</div>
      <div class="preview-grid">
        <div class="preview-row"><div class="preview-key">Название</div><div class="preview-val">${document.getElementById('doc-title').value||'—'}</div></div>
        <div class="preview-row"><div class="preview-key">Шаблон</div><div class="preview-val">${state.template?.name||'—'}</div></div>
        <div class="preview-row"><div class="preview-key">Номер</div><div class="preview-val">${document.getElementById('doc-number').value||'—'}</div></div>
        <div class="preview-row"><div class="preview-key">Дата</div><div class="preview-val">${UI.date(document.getElementById('doc-date').value)}</div></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6)">
      <div class="preview-section">
        <div class="preview-section-title">Наша компания</div>
        ${company ? `
        <div style="display:flex;flex-direction:column;gap:var(--space-2)">
          <div class="preview-row"><div class="preview-key">Наименование</div><div class="preview-val">${company.name}</div></div>
          ${company.inn ? `<div class="preview-row"><div class="preview-key">ИНН</div><div class="preview-val">${company.inn}</div></div>` : ''}
          ${company.signatory ? `<div class="preview-row"><div class="preview-key">Подписант</div><div class="preview-val">${company.signatory}</div></div>` : ''}
        </div>` : '<div class="text-muted text-sm" style="color:var(--color-error)">⚠ Не выбрана</div>'}
      </div>
      <div class="preview-section">
        <div class="preview-section-title">Контрагент</div>
        ${contractor ? `
        <div style="display:flex;flex-direction:column;gap:var(--space-2)">
          <div class="preview-row"><div class="preview-key">Наименование</div><div class="preview-val">${contractor.name}</div></div>
          ${contractor.inn ? `<div class="preview-row"><div class="preview-key">ИНН</div><div class="preview-val">${contractor.inn}</div></div>` : ''}
          ${contractor.signatory ? `<div class="preview-row"><div class="preview-key">Подписант</div><div class="preview-val">${contractor.signatory}</div></div>` : ''}
        </div>` : '<div class="text-muted text-sm" style="color:var(--color-error)">⚠ Не выбран</div>'}
      </div>
    </div>
    ${serviceRows.length ? `
    <div class="preview-section mt-4">
      <div class="preview-section-title">Услуги (${serviceRows.length} поз.)</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Наименование</th><th>Кол-во</th><th>Ед.</th><th>Цена</th><th>Сумма</th></tr></thead>
          <tbody>
            ${serviceRows.map(r=>`<tr>
              <td class="text-sm">${r.name}</td>
              <td class="text-sm" style="text-align:right">${r.qty}</td>
              <td class="text-sm">${r.unit}</td>
              <td class="text-sm" style="text-align:right;font-variant-numeric:tabular-nums">${UI.money(r.price)}</td>
              <td class="text-sm" style="text-align:right;font-variant-numeric:tabular-nums;font-weight:600">${UI.money(r.qty*r.price)}</td>
            </tr>`).join('')}
          </tbody>
          <tfoot><tr>
            <td colspan="4" style="text-align:right;font-weight:600;padding:var(--space-3)">Итого:</td>
            <td style="font-weight:700;font-size:var(--text-lg);text-align:right;font-variant-numeric:tabular-nums;padding:var(--space-3)">${UI.money(total)} ₽</td>
          </tr></tfoot>
        </table>
      </div>
    </div>` : ''}`;
}

// ===== НАВИГАЦИЯ ПО ШАГАМ =====
function goStep(n) {
  // Валидация перед переходом
  if (n > 1 && !state.template) { UI.toast('Выберите шаблон', 'error'); return; }
  if (n > 2) {
    const title = document.getElementById('doc-title').value.trim();
    const company = document.getElementById('company-select').value;
    const contractor = document.getElementById('contractor-select').value;
    if (!title)      { UI.toast('Укажите название документа', 'error'); return; }
    if (!company)    { UI.toast('Выберите компанию', 'error'); return; }
    if (!contractor) { UI.toast('Выберите контрагента', 'error'); return; }
  }
  if (n === 4) renderPreview();

  state.step = n;

  document.querySelectorAll('.wizard-panel').forEach((p, i) => {
    p.classList.toggle('active', i + 1 === n);
  });
  document.querySelectorAll('.wizard-step').forEach((s, i) => {
    const stepNum = i + 1;
    s.classList.toggle('active', stepNum === n);
    s.classList.toggle('done', stepNum < n);
  });

  // Добавить ✓ в выполненные шаги
  document.querySelectorAll('.wizard-step').forEach((s, i) => {
    const num = s.querySelector('.wizard-step-num');
    if (i + 1 < n) {
      num.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;
    } else if (i + 1 === n) {
      num.textContent = n;
    }
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== ГЕНЕРАЦИЯ ДОКУМЕНТА =====
async function generateDoc() {
  const btn = document.getElementById('generate-btn');
  const title      = document.getElementById('doc-title').value.trim();
  const companyId  = parseInt(document.getElementById('company-select').value);
  const contractorId = parseInt(document.getElementById('contractor-select').value);

  const payload = {
    template_id:   state.template.id,
    title,
    doc_number:    document.getElementById('doc-number').value.trim(),
    doc_date:      document.getElementById('doc-date').value,
    company_id:    companyId,
    contractor_id: contractorId,
    services: serviceRows.map(r => ({
      name:  r.name,
      qty:   r.qty,
      unit:  r.unit,
      price: r.price,
      total: r.qty * r.price
    }))
  };

  UI.btnLoad(btn, true);
  try {
    const res = await Api.post('/documents/generate', payload);
    await Api.download(`/documents/${res.id}/download`, `${title}.docx`);
    UI.toast('Документ создан и скачан!', 'success');
    setTimeout(() => { window.location.href = '/pages/documents.html'; }, 1500);
  } catch(e) {
    UI.toast('Ошибка генерации: ' + e.message, 'error');
    UI.btnLoad(btn, false);
  }
}

// Инициализация
init();
renderServiceRows();
</script>
