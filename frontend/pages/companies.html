<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ДокПро — Компании</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="flex items-center gap-3">
        <button class="hamburger" id="hamburger" aria-label="Меню">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">Компании</span>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" id="theme-toggle" onclick="Layout.toggleTheme()"></button>
        <button class="btn btn-primary" onclick="openModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Добавить компанию
        </button>
      </div>
    </header>

    <main class="page-content">
      <div id="list-wrap">
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 21h18M3 7l9-4 9 4M4 7v14M20 7v14M9 21V11h6v10"/></svg>
          <h3>Компании не добавлены</h3>
          <p>Добавьте компанию, от имени которой будут создаваться документы</p>
          <button class="btn btn-primary" onclick="openModal()">Добавить компанию</button>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Модалка добавления/редактирования -->
<div class="modal-overlay" id="company-modal">
  <div class="modal" style="max-width:720px">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Новая компания</span>
      <button class="btn btn-ghost btn-icon" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="company-form">
        <input type="hidden" id="company-id">

        <!-- Переключатель ЮЛ / ИП -->
        <div class="form-group">
          <label class="form-label">Тип субъекта</label>
          <div class="entity-toggle">
            <button type="button" class="entity-btn active" data-type="legal" onclick="setEntityType('legal')">Юридическое лицо</button>
            <button type="button" class="entity-btn" data-type="ip" onclick="setEntityType('ip')">Индивидуальный предприниматель</button>
          </div>
        </div>

        <!-- Блок ЮЛ -->
        <div id="legal-fields">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">Полное наименование</label>
              <input type="text" id="f-name" class="form-input" placeholder='ООО "Название"'>
            </div>
            <div class="form-group" id="short-name-group">
              <label class="form-label">Краткое наименование</label>
              <input type="text" id="f-short_name" class="form-input" placeholder='ООО "Название"'>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">ИНН</label>
              <input type="text" id="f-inn" class="form-input" placeholder="0000000000">
            </div>
            <div class="form-group" id="kpp-group">
              <label class="form-label">КПП</label>
              <input type="text" id="f-kpp" class="form-input" placeholder="000000000">
            </div>
            <div class="form-group" id="ogrn-group">
              <label class="form-label">ОГРН</label>
              <input type="text" id="f-ogrn" class="form-input" placeholder="0000000000000">
            </div>
          </div>
        </div>

        <!-- Блок ИП -->
        <div id="ip-fields" style="display:none">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">Фамилия</label>
              <input type="text" id="f-ip_lastname" class="form-input" placeholder="Иванов">
            </div>
            <div class="form-group">
              <label class="form-label required">Имя</label>
              <input type="text" id="f-ip_firstname" class="form-input" placeholder="Иван">
            </div>
            <div class="form-group">
              <label class="form-label">Отчество</label>
              <input type="text" id="f-ip_patronymic" class="form-input" placeholder="Иванович">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">ОГРНИП</label>
              <input type="text" id="f-ogrnip" class="form-input" placeholder="000000000000000">
            </div>
            <div class="form-group">
              <label class="form-label">ИНН (12 цифр)</label>
              <input type="text" id="f-inn" class="form-input" placeholder="000000000000" maxlength="12">
            </div>
          </div>
          <!-- Скрытое поле name для ИП — автозаполняется -->
          <input type="hidden" id="f-name" value="">
        </div>

        <div class="form-group">
          <label class="form-label">Юридический адрес</label>
          <input type="text" id="f-address" class="form-input" placeholder="г. Москва, ул. ...">
        </div>
        <div class="form-group">
          <label class="form-label">Почтовый адрес</label>
          <input type="text" id="f-postal_address" class="form-input" placeholder="г. Москва, ул. ...">
        </div>

        <div style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-muted);margin:var(--space-5) 0 var(--space-3)">Банковские реквизиты</div>
        <div class="form-group">
          <label class="form-label">Наименование банка</label>
          <input type="text" id="f-bank" class="form-input" placeholder="ПАО Сбербанк">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">БИК</label>
            <input type="text" id="f-bik" class="form-input" placeholder="000000000">
          </div>
          <div class="form-group">
            <label class="form-label">Расчётный счёт</label>
            <input type="text" id="f-account" class="form-input" placeholder="00000000000000000000">
          </div>
          <div class="form-group">
            <label class="form-label">Корр. счёт</label>
            <input type="text" id="f-corr_account" class="form-input" placeholder="00000000000000000000">
          </div>
        </div>

        <div style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-muted);margin:var(--space-5) 0 var(--space-3)">Подписант</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">ФИО подписанта</label>
            <input type="text" id="f-signatory" class="form-input" placeholder="Иванов Иван Иванович">
          </div>
          <div class="form-group">
            <label class="form-label">Должность</label>
            <input type="text" id="f-position" class="form-input" placeholder="Генеральный директор">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Основание (действует на основании...)</label>
          <input type="text" id="f-basis" class="form-input" placeholder="Устава">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Телефон</label>
            <input type="text" id="f-phone" class="form-input" placeholder="+7 (000) 000-00-00">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="f-email" class="form-input" placeholder="info@company.ru">
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveCompany()">Сохранить</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/layout.js"></script>
<script>
  Layout.init('companies');

  const FIELDS = ['name','short_name','inn','kpp','ogrn','address','postal_address','bank','bik','account','corr_account','signatory','position','basis','phone','email'];
  const IP_FIELDS = ['entity_type','ogrnip','ip_lastname','ip_firstname','ip_patronymic'];

  let companies = [];
  let currentEntityType = 'legal';

  // === Переключатель ЮЛ / ИП ===
  function setEntityType(type) {
    currentEntityType = type;
    document.querySelectorAll('.entity-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
    const isIP = type === 'ip';
    document.getElementById('legal-fields').style.display = isIP ? 'none' : 'block';
    document.getElementById('ip-fields').style.display    = isIP ? 'block' : 'none';
    if (isIP) { document.getElementById('f-kpp').value = ''; document.getElementById('f-ogrn').value = ''; }
    else { document.getElementById('f-ogrnip').value = ''; ['ip_lastname','ip_firstname','ip_patronymic'].forEach(id => document.getElementById('f-'+id).value = ''); }
  }

  // Автозаполнение name для ИП
  ['f-ip_lastname','f-ip_firstname','f-ip_patronymic'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', () => {
      if (currentEntityType !== 'ip') return;
      const parts = ['ИП', document.getElementById('f-ip_lastname').value.trim(), document.getElementById('f-ip_firstname').value.trim(), document.getElementById('f-ip_patronymic').value.trim()].filter(Boolean);
      document.getElementById('f-name').value = parts.join(' ');
    });
  });

  async function load() {
    try { companies = await Api.get('/companies'); render(); }
    catch(e) { UI.toast(e.message,'error'); }
  }

  function render() {
    if (!companies.length) {
      document.getElementById('list-wrap').innerHTML = `
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 21h18M3 7l9-4 9 4M4 7v14M20 7v14M9 21V11h6v10"/></svg>
          <h3>Компании не добавлены</h3>
          <p>Добавьте компанию, от имени которой будут создаваться документы</p>
          <button class="btn btn-primary" onclick="openModal()">Добавить компанию</button>
        </div>`;
      return;
    }
    document.getElementById('list-wrap').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Наименование</th><th>ИНН</th><th>Тип</th>
            <th>Подписант</th><th>Телефон</th><th></th>
          </tr></thead>
          <tbody>
            ${companies.map(c=>`
              <tr>
                <td>
                  <div class="font-semibold">${c.name}</div>
                  ${c.short_name?`<div class="text-sm text-muted">${c.short_name}</div>`:''}
                </td>
                <td class="text-sm">${c.inn||'—'}</td>
                <td>${c.entity_type === 'ip' ? '<span class="badge badge-yellow">ИП</span>' : '<span class="badge badge-gray">ЮЛ</span>'}</td>
                <td class="text-sm">${c.signatory||'—'}<br><span class="text-muted">${c.position||''}</span></td>
                <td class="text-sm">${c.phone||'—'}</td>
                <td>
                  <div class="table-actions">
                    <button class="btn btn-secondary btn-sm" onclick="editCompany(${c.id})">Изменить</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteCompany(${c.id})">Удалить</button>
                  </div>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function openModal(company) {
    FIELDS.forEach(f => document.getElementById('f-'+f).value = company?.[f]||'');
    IP_FIELDS.forEach(f => {
      const el = document.getElementById('f-'+f);
      if (el) el.value = company?.[f]||'';
    });
    document.getElementById('company-id').value = company?.id||'';
    document.getElementById('modal-title').textContent = company ? 'Редактировать компанию' : 'Новая компания';
    const type = company?.entity_type || 'legal';
    setEntityType(type);
    UI.openModal('company-modal');
  }

  function closeModal() { UI.closeModal('company-modal'); }

  function editCompany(id) {
    const c = companies.find(x=>x.id===id);
    if (c) openModal(c);
  }

  async function saveCompany() {
    const btn = document.getElementById('save-btn');
    const id = document.getElementById('company-id').value;
    const data = {};
    FIELDS.forEach(f => data[f] = document.getElementById('f-'+f).value.trim());
    IP_FIELDS.forEach(f => {
      const el = document.getElementById('f-'+f);
      if (el) data[f] = el.value.trim();
    });
    data.entity_type = currentEntityType;
    if (!data.name) { UI.toast('Укажите наименование компании','error'); return; }
    UI.btnLoad(btn, true);
    try {
      if (id) { await Api.put('/companies/'+id, data); UI.toast('Компания обновлена'); }
      else     { await Api.post('/companies', data);   UI.toast('Компания добавлена'); }
      closeModal();
      await load();
    } catch(e) { UI.toast(e.message,'error'); }
    UI.btnLoad(btn, false);
  }

  async function deleteCompany(id) {
    if (!UI.confirm('Удалить компанию?')) return;
    try { await Api.delete('/companies/'+id); UI.toast('Компания удалена'); await load(); }
    catch(e) { UI.toast(e.message,'error'); }
  }

  load();
</script>
</body>
</html>
