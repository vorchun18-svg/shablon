<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ДокПро — Документы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="flex items-center gap-3">
        <button class="hamburger" id="hamburger" aria-label="Меню">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">История документов</span>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" id="theme-toggle" onclick="Layout.toggleTheme()"></button>
        <a href="./new-document.html" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Новый документ
        </a>
      </div>
    </header>

    <main class="page-content">
      <div class="flex gap-3 mb-4" style="flex-wrap:wrap">
        <input type="text" id="search-input" class="form-input" placeholder="Поиск по названию..." style="max-width:300px" oninput="filterList()">
        <select id="type-filter" class="form-select" style="max-width:180px" onchange="filterList()">
          <option value="">Все типы</option>
          <option>Договор</option>
          <option>Спецификация</option>
          <option>Акт</option>
          <option>Счёт</option>
          <option>Другой</option>
        </select>
      </div>
      <div id="list-wrap"></div>
    </main>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/layout.js"></script>
<script>
  Layout.init('documents');
  let items = [], filtered = [];

  async function load() {
    try { items = await Api.get('/documents'); filtered = [...items]; render(); }
    catch(e) { UI.toast(e.message,'error'); }
  }

  function filterList() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const t = document.getElementById('type-filter').value;
    filtered = items.filter(d =>
      (!q || d.title.toLowerCase().includes(q) || (d.contractor_name||'').toLowerCase().includes(q)) &&
      (!t || d.doc_type === t)
    );
    render();
  }

  function render() {
    if (!filtered.length) {
      document.getElementById('list-wrap').innerHTML = `
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <h3>${items.length ? 'Ничего не найдено' : 'Документов пока нет'}</h3>
          <p>${items.length ? 'Попробуйте изменить фильтры' : 'Создайте первый документ'}</p>
          ${!items.length ? '<a href="./new-document.html" class="btn btn-primary">Создать документ</a>' : ''}
        </div>`;
      return;
    }
    document.getElementById('list-wrap').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Документ</th><th>Тип</th><th>Компания</th>
            <th>Контрагент</th><th>Сумма</th><th>Создан</th><th></th>
          </tr></thead>
          <tbody>
            ${filtered.map(d=>`
              <tr>
                <td>
                  <div class="font-semibold">${d.title}</div>
                  <div class="text-sm text-muted">${d.template_name||''}</div>
                </td>
                <td>${UI.docTypeBadge(d.doc_type)}</td>
                <td class="text-sm">${d.company_name||'—'}</td>
                <td class="text-sm">${d.contractor_name||'—'}</td>
                <td class="text-sm" style="font-variant-numeric:tabular-nums">—</td>
                <td class="text-sm text-muted">${UI.date(d.created_at)}<br><span style="font-size:var(--text-xs)">${d.created_by_name||''}</span></td>
                <td><div class="table-actions">
                  <button class="btn btn-primary btn-sm btn-download" data-id="${d.id}" data-title="${d.title}">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Скачать
                  </button>
                </div></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  load();
</script>
</body>
</html>
