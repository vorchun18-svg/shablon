<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ДокПро — Контрагенты</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="flex items-center gap-3">
        <button class="hamburger" id="hamburger" aria-label="Меню">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">Контрагенты</span>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" id="theme-toggle" onclick="Layout.toggleTheme()"></button>
        <button class="btn btn-primary" onclick="openModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Добавить контрагента
        </button>
      </div>
    </header>

    <main class="page-content">
      <!-- Поиск -->
      <div class="flex gap-3 mb-4">
        <input type="text" id="search-input" class="form-input" placeholder="Поиск по названию или ИНН..." style="max-width:360px" oninput="filterList()">
      </div>
      <div id="list-wrap"></div>
    </main>
  </div>
</div>

<!-- Модалка -->
<div class="modal-overlay" id="contractor-modal">
  <div class="modal" style="max-width:720px">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Новый контрагент</span>
      <button class="btn btn-ghost btn-icon" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="contractor-form">
        <input type="hidden" id="contractor-id">

        <!-- Переключатель ЮЛ / ИП -->
        <div class="form-group">
          <label class="form-label">Тип субъекта</label>
          <div class="entity-toggle">
            <button type="button" class="entity-btn active" data-type="legal" onclick="setEntityType('legal')">Юридическое лицо</button>
            <button type="button" class="entity-btn" data-type="ip" onclick="setEntityType('ip')">Индивидуальный предприниматель</button>
          </div>
        </div>

        <!-- Блок ЮЛ -->
        <div id="legal-fields">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">Полное наименование</label>
              <input type="text" id="f-name" class="form-input" placeholder='ООО "Контрагент"'>
            </div>
            <div class="form-group">
              <label class="form-label">Краткое наименование</label>
              <input type="text" id="f-short_name" class="form-input">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">ИНН</label><input type="text" id="f-inn" class="form-input"></div>
            <div class="form-group" id="kpp-group"><label class="form-label">КПП</label><input type="text" id="f-kpp" class="form-input"></div>
            <div class="form-group" id="ogrn-group"><label class="form-label">ОГРН</label><input type="text" id="f-ogrn" class="form-input"></div>
          </div>
        </div>

        <!-- Блок ИП -->
        <div id="ip-fields" style="display:none">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">Фамилия</label>
              <input type="text" id="f-ip_lastname" class="form-input" placeholder="Иванов">
            </div>
            <div class="form-group">
              <label class="form-label required">Имя</label>
              <input type="text" id="f-ip_firstname" class="form-input" placeholder="Иван">
            </div>
            <div class="form-group">
              <label class="form-label">Отчество</label>
              <input type="text" id="f-ip_patronymic" class="form-input" placeholder="Иванович">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">ОГРНИП</label>
              <input type="text" id="f-ogrnip" class="form-input" placeholder="000000000000000">
            </div>
            <div class="form-group">
              <label class="form-label">ИНН (12 цифр)</label>
              <input type="text" id="f-inn" class="form-input" placeholder="000000000000" maxlength="12">
            </div>
          </div>
          <input type="hidden" id="f-name" value="">
        </div>

        <div class="form-group">
          <label class="form-label">Юридический адрес</label>
          <input type="text" id="f-address" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Почтовый адрес</label>
          <input type="text" id="f-postal_address" class="form-input">
        </div>

        <div style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-muted);margin:var(--space-5) 0 var(--space-3)">Банковские реквизиты</div>
        <div class="form-group"><label class="form-label">Банк</label><input type="text" id="f-bank" class="form-input"></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">БИК</label><input type="text" id="f-bik" class="form-input"></div>
          <div class="form-group"><label class="form-label">Расчётный счёт</label><input type="text" id="f-account" class="form-input"></div>
          <div class="form-group"><label class="form-label">Корр. счёт</label><input type="text" id="f-corr_account" class="form-input"></div>
        </div>

        <div style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-muted);margin:var(--space-5) 0 var(--space-3)">Подписант и контакты</div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">ФИО подписанта</label><input type="text" id="f-signatory" class="form-input"></div>
          <div class="form-group"><label class="form-label">Должность</label><input type="text" id="f-position" class="form-input"></div>
        </div>
        <div class="form-group"><label class="form-label">Основание</label><input type="text" id="f-basis" class="form-input" placeholder="Устава"></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Контактное лицо</label><input type="text" id="f-contact_person" class="form-input"></div>
          <div class="form-group"><label class="form-label">Телефон</label><input type="text" id="f-phone" class="form-input"></div>
          <div class="form-group"><label class="form-label">Email</label><input type="email" id="f-email" class="form-input"></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" id="save-btn" onclick="save()">Сохранить</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/layout.js"></script>
<script>
  Layout.init('contractors');

  const FIELDS = ['name','short_name','inn','kpp','ogrn','address','postal_address','bank','bik','account','corr_account','signatory','position','basis','contact_person','phone','email'];
  const IP_FIELDS = ['entity_type','ogrnip','ip_lastname','ip_firstname','ip_patronymic'];

  let items = [], filtered = [];
  let currentEntityType = 'legal';

  function setEntityType(type) {
    currentEntityType = type;
    document.querySelectorAll('.entity-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
    const isIP = type === 'ip';
    document.getElementById('legal-fields').style.display = isIP ? 'none' : 'block';
    document.getElementById('ip-fields').style.display    = isIP ? 'block' : 'none';
    if (isIP) { document.getElementById('f-kpp').value = ''; document.getElementById('f-ogrn').value = ''; }
    else { document.getElementById('f-ogrnip').value = ''; ['ip_lastname','ip_firstname','ip_patronymic'].forEach(id => document.getElementById('f-'+id).value = ''); }
  }

  ['f-ip_lastname','f-ip_firstname','f-ip_patronymic'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', () => {
      if (currentEntityType !== 'ip') return;
      const parts = ['ИП', document.getElementById('f-ip_lastname').value.trim(), document.getElementById('f-ip_firstname').value.trim(), document.getElementById('f-ip_patronymic').value.trim()].filter(Boolean);
      document.getElementById('f-name').value = parts.join(' ');
    });
  });

  async function load() {
    try { items = await Api.get('/contractors'); filtered = [...items]; render(); }
    catch(e) { UI.toast(e.message,'error'); }
  }

  function filterList() {
    const q = document.getElementById('search-input').value.toLowerCase();
    filtered = q ? items.filter(c => c.name.toLowerCase().includes(q) || (c.inn||'').includes(q)) : [...items];
    render();
  }

  function render() {
    if (!filtered.length) {
      document.getElementById('list-wrap').innerHTML = `
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <h3>${items.length ? 'Ничего не найдено' : 'Контрагенты не добавлены'}</h3>
          <p>${items.length ? 'Попробуйте изменить запрос' : 'Добавьте первого контрагента'}</p>
          ${!items.length ? '<button class="btn btn-primary" onclick="openModal()">Добавить контрагента</button>' : ''}
        </div>`;
      return;
    }
    document.getElementById('list-wrap').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Наименование</th><th>ИНН</th><th>Тип</th><th>Подписант</th><th>Контакт</th><th></th></tr></thead>
          <tbody>
            ${filtered.map(c=>`
              <tr>
                <td><div class="font-semibold">${c.name}</div>${c.short_name?`<div class="text-sm text-muted">${c.short_name}</div>`:''}</td>
                <td class="text-sm">${c.inn||'—'}</td>
                <td>${c.entity_type === 'ip' ? '<span class="badge badge-yellow">ИП</span>' : '<span class="badge badge-gray">ЮЛ</span>'}</td>
                <td class="text-sm">${c.signatory||'—'}<br><span class="text-muted">${c.position||''}</span></td>
                <td class="text-sm">${c.phone||''}<br><span class="text-muted">${c.email||''}</span></td>
                <td><div class="table-actions">
                  <button class="btn btn-secondary btn-sm" onclick="edit(${c.id})">Изменить</button>
                  <button class="btn btn-danger btn-sm" onclick="del(${c.id})">Удалить</button>
                </div></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function openModal(c) {
    FIELDS.forEach(f => document.getElementById('f-'+f).value = c?.[f]||'');
    IP_FIELDS.forEach(f => {
      const el = document.getElementById('f-'+f);
      if (el) el.value = c?.[f]||'';
    });
    document.getElementById('contractor-id').value = c?.id||'';
    document.getElementById('modal-title').textContent = c ? 'Редактировать контрагента' : 'Новый контрагент';
    const type = c?.entity_type || 'legal';
    setEntityType(type);
    UI.openModal('contractor-modal');
  }
  function closeModal() { UI.closeModal('contractor-modal'); }
  function edit(id) { openModal(items.find(x=>x.id===id)); }

  async function save() {
    const btn = document.getElementById('save-btn');
    const id = document.getElementById('contractor-id').value;
    const data = {};
    FIELDS.forEach(f => data[f] = document.getElementById('f-'+f).value.trim());
    IP_FIELDS.forEach(f => {
      const el = document.getElementById('f-'+f);
      if (el) data[f] = el.value.trim();
    });
    data.entity_type = currentEntityType;
    if (!data.name) { UI.toast('Укажите наименование','error'); return; }
    UI.btnLoad(btn, true);
    try {
      if (id) { await Api.put('/contractors/'+id, data); UI.toast('Контрагент обновлён'); }
      else     { await Api.post('/contractors', data);   UI.toast('Контрагент добавлен'); }
      closeModal(); await load();
    } catch(e) { UI.toast(e.message,'error'); }
    UI.btnLoad(btn, false);
  }

  async function del(id) {
    if (!UI.confirm('Удалить контрагента?')) return;
    try { await Api.delete('/contractors/'+id); UI.toast('Удалено'); await load(); }
    catch(e) { UI.toast(e.message,'error'); }
  }

  load();
</script>
</body>
</html>
