<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ДокПро — Услуги</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="flex items-center gap-3">
        <button class="hamburger" id="hamburger" aria-label="Меню">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">Услуги</span>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" id="theme-toggle" onclick="Layout.toggleTheme()"></button>
        <button class="btn btn-primary" onclick="openModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Добавить услугу
        </button>
      </div>
    </header>

    <main class="page-content">
      <div id="list-wrap"></div>
    </main>
  </div>
</div>

<!-- Модалка -->
<div class="modal-overlay" id="service-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Новая услуга</span>
      <button class="btn btn-ghost btn-icon" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="service-id">
      <div class="form-group">
        <label class="form-label required">Наименование услуги</label>
        <input type="text" id="f-name" class="form-input" placeholder="Топографическая съёмка" required>
      </div>
      <div class="form-group">
        <label class="form-label">Описание</label>
        <textarea id="f-description" class="form-textarea" placeholder="Подробное описание услуги..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Единица измерения</label>
          <select id="f-unit" class="form-select">
            <option value="шт.">шт.</option>
            <option value="услуга">услуга</option>
            <option value="час">час</option>
            <option value="день">день</option>
            <option value="м²">м²</option>
            <option value="км">км</option>
            <option value="га">га</option>
            <option value="компл.">компл.</option>
            <option value="работа">работа</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Цена за единицу, ₽</label>
          <input type="number" id="f-price" class="form-input" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" id="save-btn" onclick="save()">Сохранить</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/layout.js"></script>
<script>
  Layout.init('services');
  let items = [];

  async function load() {
    try { items = await Api.get('/services'); render(); }
    catch(e) { UI.toast(e.message,'error'); }
  }

  function render() {
    if (!items.length) {
      document.getElementById('list-wrap').innerHTML = `
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          <h3>Услуги не добавлены</h3>
          <p>Добавьте услуги для автозаполнения в документах</p>
          <button class="btn btn-primary" onclick="openModal()">Добавить услугу</button>
        </div>`;
      return;
    }
    document.getElementById('list-wrap').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Наименование</th><th>Описание</th><th>Ед. изм.</th><th>Цена, ₽</th><th></th></tr></thead>
          <tbody>
            ${items.map(s=>`
              <tr>
                <td class="font-semibold">${s.name}</td>
                <td class="text-sm text-muted">${s.description||'—'}</td>
                <td class="text-sm">${s.unit||'шт.'}</td>
                <td class="text-sm" style="font-variant-numeric:tabular-nums">${UI.money(s.price)}</td>
                <td><div class="table-actions">
                  <button class="btn btn-secondary btn-sm" onclick="edit(${s.id})">Изменить</button>
                  <button class="btn btn-danger btn-sm" onclick="del(${s.id})">Удалить</button>
                </div></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function openModal(s) {
    document.getElementById('service-id').value = s?.id||'';
    document.getElementById('f-name').value = s?.name||'';
    document.getElementById('f-description').value = s?.description||'';
    document.getElementById('f-unit').value = s?.unit||'шт.';
    document.getElementById('f-price').value = s?.price||'';
    document.getElementById('modal-title').textContent = s ? 'Редактировать услугу' : 'Новая услуга';
    UI.openModal('service-modal');
  }
  function closeModal() { UI.closeModal('service-modal'); }
  function edit(id) { openModal(items.find(x=>x.id===id)); }

  async function save() {
    const btn = document.getElementById('save-btn');
    const id = document.getElementById('service-id').value;
    const data = {
      name: document.getElementById('f-name').value.trim(),
      description: document.getElementById('f-description').value.trim(),
      unit: document.getElementById('f-unit').value,
      price: parseFloat(document.getElementById('f-price').value)||0
    };
    if (!data.name) { UI.toast('Укажите наименование услуги','error'); return; }
    UI.btnLoad(btn, true);
    try {
      if (id) { await Api.put('/services/'+id, data); UI.toast('Услуга обновлена'); }
      else     { await Api.post('/services', data);   UI.toast('Услуга добавлена'); }
      closeModal(); await load();
    } catch(e) { UI.toast(e.message,'error'); }
    UI.btnLoad(btn, false);
  }

  async function del(id) {
    if (!UI.confirm('Удалить услугу?')) return;
    try { await Api.delete('/services/'+id); UI.toast('Удалено'); await load(); }
    catch(e) { UI.toast(e.message,'error'); }
  }

  load();
</script>
</body>
</html>
