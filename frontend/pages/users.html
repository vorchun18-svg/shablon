<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ДокПро — Пользователи</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="flex items-center gap-3">
        <button class="hamburger" id="hamburger" aria-label="Меню">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">Пользователи</span>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" id="theme-toggle" onclick="Layout.toggleTheme()"></button>
        <button class="btn btn-primary" onclick="openModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Добавить пользователя
        </button>
      </div>
    </header>

    <main class="page-content">
      <div id="list-wrap"></div>
    </main>
  </div>
</div>

<!-- Модалка -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Новый пользователь</span>
      <button class="btn btn-ghost btn-icon" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="user-id">
      <div class="form-group">
        <label class="form-label required">ФИО</label>
        <input type="text" id="f-full_name" class="form-input" placeholder="Иванов Иван Иванович">
      </div>
      <div class="form-group">
        <label class="form-label required">Логин</label>
        <input type="text" id="f-username" class="form-input" placeholder="ivanov" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label" id="pw-label">Пароль</label>
        <input type="password" id="f-password" class="form-input" placeholder="Минимум 6 символов" autocomplete="new-password">
        <div class="form-hint" id="pw-hint"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Роль</label>
        <select id="f-role" class="form-select">
          <option value="user">Пользователь</option>
          <option value="admin">Администратор</option>
        </select>
      </div>
      <div class="form-group" id="active-group" style="display:none">
        <label class="form-label">Статус</label>
        <select id="f-is_active" class="form-select">
          <option value="1">Активен</option>
          <option value="0">Заблокирован</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" id="save-btn" onclick="save()">Сохранить</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/layout.js"></script>
<script>
  Layout.init('users');
  if (!Auth.requireAdmin()) throw '';
  let items = [];

  async function load() {
    try { items = await Api.get('/users'); render(); }
    catch(e) { UI.toast(e.message,'error'); }
  }

  function render() {
    const me = Auth.getUser();
    document.getElementById('list-wrap').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Пользователь</th><th>Логин</th><th>Роль</th><th>Статус</th><th>Создан</th><th></th></tr></thead>
          <tbody>
            ${items.map(u=>`
              <tr>
                <td>
                  <div class="flex items-center gap-3">
                    <div style="width:32px;height:32px;border-radius:50%;background:var(--color-primary-light);display:flex;align-items:center;justify-content:center;color:var(--color-primary);font-size:var(--text-xs);font-weight:700;flex-shrink:0">
                      ${UI.initials(u.full_name)}
                    </div>
                    <span class="font-semibold">${u.full_name}</span>
                    ${u.id===me.id?'<span class="badge badge-blue">Вы</span>':''}
                  </div>
                </td>
                <td class="text-sm">${u.username}</td>
                <td>${u.role==='admin'?'<span class="badge badge-yellow">Администратор</span>':'<span class="badge badge-gray">Пользователь</span>'}</td>
                <td>${u.is_active?'<span class="badge badge-green">Активен</span>':'<span class="badge badge-red">Заблокирован</span>'}</td>
                <td class="text-sm text-muted">${UI.date(u.created_at)}</td>
                <td><div class="table-actions">
                  <button class="btn btn-secondary btn-sm" onclick="edit(${u.id})">Изменить</button>
                  ${u.id!==me.id?`<button class="btn btn-danger btn-sm" onclick="del(${u.id})">Удалить</button>`:''}
                </div></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function openModal(u) {
    document.getElementById('user-id').value = u?.id||'';
    document.getElementById('f-full_name').value = u?.full_name||'';
    document.getElementById('f-username').value = u?.username||'';
    document.getElementById('f-password').value = '';
    document.getElementById('f-role').value = u?.role||'user';
    document.getElementById('f-is_active').value = u?.is_active??1;
    document.getElementById('f-username').disabled = !!u;
    document.getElementById('modal-title').textContent = u ? 'Редактировать пользователя' : 'Новый пользователь';
    document.getElementById('pw-label').textContent = u ? 'Новый пароль (оставьте пустым чтобы не менять)' : 'Пароль *';
    document.getElementById('pw-hint').textContent = u ? 'Заполните только если хотите сменить пароль' : '';
    document.getElementById('active-group').style.display = u ? 'block' : 'none';
    UI.openModal('user-modal');
  }
  function closeModal() { UI.closeModal('user-modal'); }
  function edit(id) { openModal(items.find(x=>x.id===id)); }

  async function save() {
    const btn = document.getElementById('save-btn');
    const id = document.getElementById('user-id').value;
    const data = {
      full_name: document.getElementById('f-full_name').value.trim(),
      username:  document.getElementById('f-username').value.trim(),
      password:  document.getElementById('f-password').value,
      role:      document.getElementById('f-role').value,
      is_active: parseInt(document.getElementById('f-is_active').value)
    };
    if (!data.full_name) { UI.toast('Укажите ФИО','error'); return; }
    if (!id && !data.password) { UI.toast('Укажите пароль','error'); return; }
    if (data.password && data.password.length < 6) { UI.toast('Пароль минимум 6 символов','error'); return; }
    UI.btnLoad(btn, true);
    try {
      if (id) { await Api.put('/users/'+id, data); UI.toast('Пользователь обновлён'); }
      else     { await Api.post('/users', data);   UI.toast('Пользователь создан'); }
      closeModal(); await load();
    } catch(e) { UI.toast(e.message,'error'); }
    UI.btnLoad(btn, false);
  }

  async function del(id) {
    if (!UI.confirm('Удалить пользователя?')) return;
    try { await Api.delete('/users/'+id); UI.toast('Удалено'); await load(); }
    catch(e) { UI.toast(e.message,'error'); }
  }

  load();
</script>
</body>
</html>
