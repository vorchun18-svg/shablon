<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ДокПро — Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; background: var(--color-bg); }
    .login-wrap { width: 100%; max-width: 400px; padding: var(--space-4); }
    .login-logo { display: flex; align-items: center; justify-content: center; gap: var(--space-3); margin-bottom: var(--space-8); }
    .login-logo-text { font-size: var(--text-xl); font-weight: 700; color: var(--color-text); letter-spacing: -0.02em; }
    .login-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-xl); box-shadow: var(--shadow-md); padding: var(--space-8); }
    .login-title { font-size: var(--text-lg); font-weight: 600; margin-bottom: var(--space-2); }
    .login-subtitle { font-size: var(--text-sm); color: var(--color-text-muted); margin-bottom: var(--space-6); }
    .login-footer { text-align: center; margin-top: var(--space-6); font-size: var(--text-xs); color: var(--color-text-faint); }
    .theme-toggle-login { position: fixed; top: var(--space-4); right: var(--space-4); }
  </style>
</head>
<body>
  <button class="theme-toggle theme-toggle-login" id="theme-toggle" onclick="toggleTheme()" title="Сменить тему"></button>

  <div class="login-wrap">
    <div class="login-logo">
      <svg width="36" height="36" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#2563eb"/>
        <path d="M7 8h14M7 12h10M7 16h12M7 20h8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="login-logo-text">ДокПро</span>
    </div>

    <div class="login-card">
      <div class="login-title">Добро пожаловать</div>
      <div class="login-subtitle">Войдите в свой аккаунт для продолжения</div>

      <div id="error-msg" class="alert alert-error hidden"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label required" for="username">Логин</label>
          <input type="text" id="username" class="form-input" placeholder="Введите логин" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label class="form-label required" for="password">Пароль</label>
          <div style="position:relative">
            <input type="password" id="password" class="form-input" placeholder="Введите пароль" autocomplete="current-password" required style="padding-right:44px">
            <button type="button" id="toggle-pw" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--color-text-muted);padding:4px" onclick="togglePw()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="pw-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg mt-4" id="submit-btn">Войти</button>
      </form>
    </div>

    <div class="login-footer">ДокПро © 2026 — Система генерации документов</div>
  </div>

  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/ui.js"></script>
  <script>
    // Инициализация темы
    (function() {
      const saved = localStorage.getItem('dp_theme');
      const sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      const theme = saved || sys;
      document.documentElement.setAttribute('data-theme', theme);
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.innerHTML = theme === 'dark'
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    })();

    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme') || 'light';
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('dp_theme', next);
      const btn = document.getElementById('theme-toggle');
      btn.innerHTML = next === 'dark'
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    }

    function togglePw() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    // Редирект если уже залогинен
    Auth.init();
    if (Auth.isLoggedIn()) window.location.href = '/index.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('hidden');
      UI.btnLoad(btn, true);
      try {
        const data = await Api.post('/auth/login', {
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value
        });
        Auth.save(data.token, data.user);
        window.location.href = '/index.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        UI.btnLoad(btn, false);
      }
    });
  </script>
</body>
</html>
