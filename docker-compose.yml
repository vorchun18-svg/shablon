version: '3.8'

services:
  backend:
    build: ./backend
    container_name: dokpro-backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    networks:
      - dokpro-net

  nginx:
    image: nginx:alpine
    container_name: dokpro-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - dokpro-net

networks:
  dokpro-net:
    driver: bridge
